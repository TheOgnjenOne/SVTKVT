<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container d-flex align-items-center">
    <!-- Logo -->
    <a class="navbar-brand fw-bold fs-4" routerLink="/">
      <i class="bi bi-rocket-takeoff me-2"></i>
      Moj Projekat
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
            aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-between" id="mainNavbar">
      <div class="flex-grow-1 d-flex justify-content-center">
        <ul class="navbar-nav" *ngIf="isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Početna</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/locations" routerLinkActive="active">Mesta</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/events" routerLinkActive="active">Dogadjaji</a>
          </li>
          <li class="nav-item dropdown" *ngIf="(currentUser$ | async)?.role === 'MANAGER'">
            <a class="nav-link " routerLink="/analytics" routerLinkActive="active" role="button">
              Analitika
            </a>
          </li>
          <li class="nav-item dropdown" *ngIf="(currentUser$ | async)?.role === 'ADMIN'">
            <a class="nav-link dropdown-toggle" id="adminDropdown" role="button"
               data-bs-toggle="dropdown" aria-expanded="false">
              Admin
            </a>
            <ul class="dropdown-menu" aria-labelledby="adminDropdown">
              <li>
                <a class="dropdown-item" routerLink="/admin/registration-requests" routerLinkActive="active">
                  Zahtevi za registraciju
                </a>
              </li>
            </ul>
          </li>
        </ul>
      </div>

      <div class="d-flex align-items-center gap-2">
        <div *ngIf="isLoggedIn(); else notLoggedIn" class="dropdown">
          <button class="btn btn-outline-light btn-sm dropdown-toggle d-flex align-items-center"
                  type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle me-2"></i>
            Korisnik
          </button>
          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
            <li><a class="dropdown-item" routerLink="/profile/details"><i class="bi bi-person me-2"></i>Moj profil</a></li>
            <li><a class="dropdown-item" routerLink="/profile/settings"><i class="bi bi-gear me-2"></i>Podešavanja</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><button class="dropdown-item text-danger" (click)="logout()"><i class="bi bi-box-arrow-right me-2"></i>Odjavi se</button></li>
          </ul>
        </div>

        <ng-template #notLoggedIn>
          <button class="btn btn-outline-light btn-sm d-flex align-items-center btn-login" (click)="goToLogin()">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Prijava
          </button>
          <button class="btn btn-outline-light btn-sm d-flex align-items-center btn-register" (click)="goToRegister()">
            <i class="bi bi-person-plus me-2"></i>
            Registracija
          </button>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
