<div class="login-container">
  <h2>Prijava</h2>

  <div *ngIf="errorMsg" class="text-danger my-2">
    {{ errorMsg }}
  </div>

  <form (ngSubmit)="onLoginSubmit()">

    <div>
      <label for="email">Email adresa:</label>
      <input
        type="email" id="email"
        name="email"
        placeholder="Unesite email"
        [(ngModel)]="loginModel.email" required>
    </div>

    <div>
      <label for="password">Lozinka:</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Lozinka"
        [(ngModel)]="loginModel.password"
        required>
    </div>

    <button type="submit">Prijavi se</button>
  </form>
</div>
